<!DOCTYPE html>
<html lang="tr" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beşiktaş Meydanı Müzisyen Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { height: 8px; width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="min-h-full bg-[#030712] antialiased flex flex-col">

    <!-- Üst Bar -->
    <header class="bg-[#0b1329] border-b border-slate-800/60 sticky top-0 z-50 px-6 py-3.5 shadow-xl">
        <div class="max-w-[1800px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-guitar text-orange-500 text-2xl animate-bounce"></i>
                <div>
                    <h1 class="font-extrabold text-xl tracking-tight text-white">MEYDAN TAKİP</h1>
                    <span class="text-[11px] text-slate-400 font-medium flex items-center gap-1 mt-0.5">
                        Beşiktaş Meydanı canlı veritabanı aktif.
                    </span>
                </div>
            </div>
            
            <div class="bg-[#050b18] border border-slate-800/80 px-5 py-2 rounded-xl text-center shadow-inner">
                <h2 id="dinamik-tarih-basligi" class="text-sm font-black text-slate-200 tracking-wide uppercase">29 HAZİRAN - 5 TEMMUZ SLOT TAKVİMİ</h2>
            </div>

            <div class="flex items-center gap-4">
                <div id="havadurumu-alan" class="text-[11px] font-bold text-slate-400 bg-[#050b18] border border-slate-800/80 px-3 py-1.5 rounded-lg">
                    <span id="havadurumu-derece">Beşiktaş: 22°C</span>
                </div>
                <div id="auth-status-area"></div>
            </div>
        </div>
    </header>

    <!-- Ana Akış: Fotoğraftaki Gibi Yatay ve Düzenli -->
    <main class="flex-1 max-w-[1800px] w-full mx-auto px-6 py-6 space-y-6">
        
        <!-- Slot Takvimi (Üstte Yan Yana Akan Kartlar) -->
        <div class="w-full overflow-hidden">
            <div id="program-akisi" class="flex gap-4 overflow-x-auto pb-4 pt-1 outline-none">
                <!-- JS Kartları Buraya Gelecek -->
            </div>
        </div>

        <!-- Alt Bölüm: 3 Eşit Panel -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Canlı Takas İstekleri -->
            <div class="bg-[#0b1329] border border-slate-800/70 rounded-xl p-4 shadow-lg min-h-[180px]">
                <h3 class="font-bold text-xs text-cyan-400 uppercase tracking-wider flex items-center gap-2 mb-3 border-b border-slate-800 pb-1.5">
                    <i class="fa-solid fa-right-left"></i> Canlı Takas İstekleri
                </h3>
                <div id="canli-takas-talepleri-alani" class="space-y-2 text-xs"></div>
            </div>

            <!-- Meydan Pano / Bildirimler -->
            <div class="bg-[#0b1329] border border-slate-800/70 rounded-xl p-4 shadow-lg flex flex-col min-h-[220px]">
                <h3 class="font-bold text-xs text-orange-500 uppercase tracking-wider flex items-center gap-2 mb-3 border-b border-slate-800 pb-1.5">
                    <i class="fa-regular fa-comments"></i> Meydan Pano / Bildirimler
                </h3>
                <div id="musaidlik-notlari" class="flex-1 overflow-y-auto space-y-2 mb-3 text-xs text-slate-300">
                    <p class="text-slate-500 italic">Henüz bildirim yok.</p>
                </div>
                <div class="flex gap-2">
                    <textarea id="not-icerik" rows="1" placeholder="Duyuru yazın..." class="flex-1 bg-[#050b18] border border-slate-800 rounded-lg text-xs p-2 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/50 resize-none"></textarea>
                    <button onclick="notEkle()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold px-4 rounded-lg text-xs transition cursor-pointer">Yaz</button>
                </div>
            </div>

            <!-- Meydan Müzisyenleri -->
            <div class="bg-[#0b1329] border border-slate-800/70 rounded-xl p-4 shadow-lg flex flex-col min-h-[180px]">
                <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-1.5">
                    <h3 class="font-bold text-xs text-emerald-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-users"></i> Meydan Müzisyenleri
                    </h3>
                    <span id="aktif-uye-sayisi" class="text-[9px] font-bold bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full">1 Aktif</span>
                </div>
                <div id="muzisyen-listesi-alan" class="flex-1 overflow-y-auto space-y-2 text-xs"></div>
            </div>

        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
