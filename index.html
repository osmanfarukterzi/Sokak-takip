<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokak Takip - Haftalık Program</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-4">

    <header class="max-w-4xl mx-auto mb-6 text-center border-b border-slate-850 pb-4">
        <h1 class="text-2xl font-bold text-emerald-400">🎸 Sokak Takip Projesi</h1>
        <p class="text-xs text-slate-400 mt-1">Haftalık Çalışma Takvimi</p>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-4">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow">
                <h2 class="text-md font-bold text-amber-400 mb-2">⚠️ Önemli Kurallar</h2>
                <ul class="text-xs text-slate-300 space-y-2">
                    <li>• 1 kişi en fazla 2 çıkmayanın hakkını alabilir. 3.sünde sormak zorunda!</li>
                    <li>• Yer değiştirilecekse önce özelden sorulmalıdır.</li>
                    <li>• Haftada 1 slotu olanlar boş slotlarda önceliklidir.</li>
                </ul>
            </div>
        </div>

        <div class="md:col-span-2 space-y-4" id="program-akisi">
            <p class="text-slate-400 text-center py-4">Program yükleniyor, lütfen bekleyin...</p>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
